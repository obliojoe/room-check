<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room Check</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090b10;
        --panel: rgba(17, 22, 33, 0.92);
        --panel-strong: #141a26;
        --line: rgba(148, 163, 184, 0.18);
        --text: #eef2ff;
        --muted: #a6b0c7;
        --accent: #65d6ce;
        --accent-2: #f4b860;
        --danger: #f07f7f;
        --good: #78e08f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(101, 214, 206, 0.18), transparent 28%),
          radial-gradient(circle at bottom right, rgba(244, 184, 96, 0.16), transparent 32%),
          var(--bg);
        color: var(--text);
      }

      #app {
        width: min(100%, 720px);
        margin: 0 auto;
        padding: 20px 16px 48px;
      }

      .shell {
        display: grid;
        gap: 16px;
      }

      .hero,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        backdrop-filter: blur(16px);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
      }

      .hero {
        padding: 20px;
      }

      .eyebrow {
        font-size: 0.77rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .hero h1 {
        margin-top: 8px;
        font-size: clamp(2rem, 8vw, 3.4rem);
        line-height: 0.95;
      }

      .subtitle {
        margin-top: 14px;
        color: var(--muted);
        line-height: 1.5;
      }

      .panel {
        padding: 16px;
      }

      .mode-row,
      .button-row,
      .stats-grid,
      .bands {
        display: grid;
        gap: 12px;
      }

      .mode-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      button {
        border: 0;
        border-radius: 16px;
        min-height: 52px;
        padding: 14px 16px;
        font: inherit;
        color: var(--text);
        background: var(--panel-strong);
      }

      button.primary {
        background: linear-gradient(135deg, rgba(101, 214, 206, 0.9), rgba(78, 150, 230, 0.9));
        color: #061218;
        font-weight: 700;
      }

      button.secondary.active {
        outline: 2px solid rgba(101, 214, 206, 0.9);
      }

      button:disabled {
        opacity: 0.5;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 38px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--danger);
      }

      .dot.good {
        background: var(--good);
      }

      .progress-bar {
        margin-top: 12px;
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        overflow: hidden;
      }

      .progress-bar > span {
        display: block;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        transition: width 120ms linear;
      }

      .stats-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat {
        padding: 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.035);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .label {
        display: block;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .value {
        display: block;
        margin-top: 6px;
        font-size: 1.5rem;
        font-weight: 700;
      }

      .bands {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .band {
        padding: 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.035);
      }

      canvas {
        display: block;
        width: 100%;
        height: 180px;
        margin-top: 14px;
        border-radius: 16px;
        background: #0b1018;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      ul {
        margin: 12px 0 0;
        padding-left: 18px;
        color: var(--muted);
        line-height: 1.5;
      }

      .caveat {
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.4;
      }

      .hidden {
        display: none;
      }

      @media (min-width: 640px) {
        .button-row {
          grid-template-columns: 1.3fr 1fr;
        }

        .stats-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="/assets/main.js"></script>
  </body>
</html>
